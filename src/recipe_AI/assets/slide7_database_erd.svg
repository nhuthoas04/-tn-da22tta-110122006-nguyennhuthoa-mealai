<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f7fffb; }
      .title { font-family: Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #065f46; }
      .subtitle { font-family: Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #49665c; }
      .group-title { font-family: Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #047857; }
      .table { fill: #ffffff; stroke: #34d399; stroke-width: 3; rx: 16; filter: url(#shadow); }
      .head { fill: #047857; rx: 16; }
      .table-name { font-family: Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #ffffff; }
      .field { font-family: Arial, sans-serif; font-size: 18px; fill: #15372d; }
      .key { font-family: Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #047857; }
      .rel { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .rel-soft { stroke: #7dd3fc; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .rel-label { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #0f766e; }
      .note { font-family: Arial, sans-serif; font-size: 18px; fill: #35554b; }
      .pill { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 2; rx: 18; }
      .pill-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #047857; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#064e3b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <rect x="38" y="32" width="1844" height="1016" rx="32" fill="#ffffff" stroke="#bbf7d0" stroke-width="4"/>

  <text x="960" y="86" text-anchor="middle" class="title">CƠ SỞ DỮ LIỆU MEALAI - ERD TỔNG QUAN</text>
  <text x="960" y="124" text-anchor="middle" class="subtitle">PostgreSQL lưu người dùng, công thức, tủ lạnh, thực đơn, mua sắm, đánh giá và dữ liệu dinh dưỡng</text>

  <rect x="96" y="157" width="430" height="44" class="pill"/>
  <text x="311" y="186" text-anchor="middle" class="pill-text">Nhóm người dùng &amp; cá nhân hóa</text>
  <rect x="744" y="157" width="430" height="44" class="pill"/>
  <text x="959" y="186" text-anchor="middle" class="pill-text">Nhóm công thức &amp; nguyên liệu</text>
  <rect x="1394" y="157" width="430" height="44" class="pill"/>
  <text x="1609" y="186" text-anchor="middle" class="pill-text">Nhóm thực đơn &amp; mua sắm</text>

  <!-- Relation lines behind cards -->
  <path class="rel" d="M 245 388 C 245 500, 245 610, 245 704"/>
  <text x="265" y="558" class="rel-label">quản lý tủ lạnh</text>

  <path class="rel" d="M 380 358 C 535 340, 570 260, 760 300"/>
  <text x="530" y="308" class="rel-label">đóng góp</text>

  <path class="rel" d="M 380 358 C 900 430, 1190 295, 1395 302"/>
  <text x="1115" y="300" class="rel-label">lập</text>

  <path class="rel" d="M 1005 360 C 1060 470, 1075 520, 1130 618"/>
  <text x="1080" y="500" class="rel-label">gồm</text>

  <path class="rel" d="M 985 670 C 1040 790, 1210 875, 1390 858"/>
  <text x="1205" y="842" class="rel-label">cần mua</text>

  <path class="rel" d="M 1570 386 C 1540 490, 1512 555, 1495 646"/>
  <text x="1535" y="519" class="rel-label">chứa</text>

  <path class="rel" d="M 1620 742 C 1590 785, 1575 806, 1542 850"/>
  <text x="1583" y="808" class="rel-label">sinh ra</text>

  <path class="rel-soft" d="M 1240 326 C 1290 370, 1315 420, 1395 452"/>
  <text x="1300" y="399" class="rel-label">được chọn</text>

  <path class="rel" d="M 805 548 C 850 465, 870 420, 908 360"/>
  <text x="830" y="463" class="rel-label">liên kết</text>

  <path class="rel-soft" d="M 382 358 C 520 500, 520 715, 650 790"/>
  <text x="476" y="728" class="rel-label">đánh giá / yêu thích</text>

  <!-- USERS -->
  <g transform="translate(96 224)">
    <rect class="table" width="286" height="164"/>
    <rect class="head" width="286" height="46"/>
    <text x="143" y="31" text-anchor="middle" class="table-name">USERS</text>
    <text x="18" y="76" class="field"><tspan class="key">PK</tspan> id (uuid)</text>
    <text x="18" y="103" class="field">email, fullName</text>
    <text x="18" y="130" class="field">role: user/admin</text>
    <text x="18" y="157" class="field">TDEE, emailVerified</text>
  </g>

  <!-- USER PREFERENCES -->
  <g transform="translate(96 446)">
    <rect class="table" width="300" height="170"/>
    <rect class="head" width="300" height="46"/>
    <text x="150" y="31" text-anchor="middle" class="table-name">USER_PREFERENCES</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> userId</text>
    <text x="18" y="105" class="field">dietType, allergies</text>
    <text x="18" y="132" class="field">healthConditions</text>
    <text x="18" y="159" class="field">servings, maxCookingTime</text>
  </g>

  <!-- INVENTORY -->
  <g transform="translate(96 704)">
    <rect class="table" width="300" height="200"/>
    <rect class="head" width="300" height="46"/>
    <text x="150" y="31" text-anchor="middle" class="table-name">INVENTORY</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> userId</text>
    <text x="18" y="105" class="field"><tspan class="key">FK</tspan> ingredientId</text>
    <text x="18" y="132" class="field">quantity, unit</text>
    <text x="18" y="159" class="field">purchaseDate</text>
    <text x="18" y="186" class="field">expiryDate</text>
  </g>

  <!-- RECIPES -->
  <g transform="translate(760 224)">
    <rect class="table" width="300" height="202"/>
    <rect class="head" width="300" height="46"/>
    <text x="150" y="31" text-anchor="middle" class="table-name">RECIPES</text>
    <text x="18" y="78" class="field"><tspan class="key">PK</tspan> id (uuid)</text>
    <text x="18" y="105" class="field">name, cookingTime</text>
    <text x="18" y="132" class="field">calories, protein, carbs, fat</text>
    <text x="18" y="159" class="field">steps, mealType, status</text>
    <text x="18" y="186" class="field"><tspan class="key">FK</tspan> submittedBy</text>
  </g>

  <!-- INGREDIENTS -->
  <g transform="translate(540 524)">
    <rect class="table" width="274" height="150"/>
    <rect class="head" width="274" height="46"/>
    <text x="137" y="31" text-anchor="middle" class="table-name">INGREDIENTS</text>
    <text x="18" y="78" class="field"><tspan class="key">PK</tspan> id</text>
    <text x="18" y="105" class="field">name, category</text>
    <text x="18" y="132" class="field">unit, calories</text>
  </g>

  <!-- RECIPE_INGREDIENTS -->
  <g transform="translate(930 546)">
    <rect class="table" width="310" height="170"/>
    <rect class="head" width="310" height="46"/>
    <text x="155" y="31" text-anchor="middle" class="table-name">RECIPE_INGREDIENTS</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> recipeId</text>
    <text x="18" y="105" class="field"><tspan class="key">FK</tspan> ingredientId</text>
    <text x="18" y="132" class="field">quantity, unit</text>
    <text x="18" y="159" class="field">chuẩn hóa N-N</text>
  </g>

  <!-- RATINGS / FAVORITES -->
  <g transform="translate(628 750)">
    <rect class="table" width="310" height="150"/>
    <rect class="head" width="310" height="46"/>
    <text x="155" y="31" text-anchor="middle" class="table-name">RATINGS / FAVORITES</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> userId, recipeId</text>
    <text x="18" y="105" class="field">rating, review, isFlagged</text>
    <text x="18" y="132" class="field">yêu thích &amp; kiểm duyệt</text>
  </g>

  <!-- MEAL PLANS -->
  <g transform="translate(1394 224)">
    <rect class="table" width="300" height="202"/>
    <rect class="head" width="300" height="46"/>
    <text x="150" y="31" text-anchor="middle" class="table-name">MEAL_PLANS</text>
    <text x="18" y="78" class="field"><tspan class="key">PK</tspan> id</text>
    <text x="18" y="105" class="field"><tspan class="key">FK</tspan> userId</text>
    <text x="18" y="132" class="field">weekStart, weekEnd</text>
    <text x="18" y="159" class="field">totalCalories</text>
    <text x="18" y="186" class="field">isAutoGenerated, status</text>
  </g>

  <!-- MEAL PLAN ITEMS -->
  <g transform="translate(1325 512)">
    <rect class="table" width="335" height="202"/>
    <rect class="head" width="335" height="46"/>
    <text x="167" y="31" text-anchor="middle" class="table-name">MEAL_PLAN_ITEMS</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> mealPlanId</text>
    <text x="18" y="105" class="field"><tspan class="key">FK</tspan> recipeId</text>
    <text x="18" y="132" class="field">mealDate, mealType</text>
    <text x="18" y="159" class="field">calories, isLocked</text>
    <text x="18" y="186" class="field">isConsumed</text>
  </g>

  <!-- SHOPPING LISTS -->
  <g transform="translate(1390 820)">
    <rect class="table" width="300" height="160"/>
    <rect class="head" width="300" height="46"/>
    <text x="150" y="31" text-anchor="middle" class="table-name">SHOPPING_LISTS</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> userId, mealPlanId</text>
    <text x="18" y="105" class="field">name, status</text>
    <text x="18" y="132" class="field">createdAt, updatedAt</text>
  </g>

  <!-- SHOPPING LIST ITEMS -->
  <g transform="translate(990 820)">
    <rect class="table" width="335" height="180"/>
    <rect class="head" width="335" height="46"/>
    <text x="167" y="31" text-anchor="middle" class="table-name">SHOPPING_LIST_ITEMS</text>
    <text x="18" y="78" class="field"><tspan class="key">FK</tspan> shoppingListId</text>
    <text x="18" y="105" class="field"><tspan class="key">FK</tspan> ingredientId</text>
    <text x="18" y="132" class="field">quantityNeeded</text>
    <text x="18" y="159" class="field">quantitySourced, needToBuy</text>
  </g>

  <!-- foot notes -->
  <text x="96" y="1008" class="note">Ghi chú: PK = khóa chính, FK = khóa ngoại. Công thức và nguyên liệu là quan hệ nhiều-nhiều qua bảng RECIPE_INGREDIENTS.</text>
  <text x="96" y="1038" class="note">Thực đơn sinh danh sách mua sắm; nguyên liệu trong tủ lạnh được dùng để trừ phần cần mua.</text>
</svg>
